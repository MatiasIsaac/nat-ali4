<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Kirameter (recreación) - slider con gato</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    background: #000;
  }
  #stage {
    position: relative;
    width: 100vw;
    height: 100vh;
    background: linear-gradient(115deg, #105770 15%, #291737 45%, #92220f 85%);
  }
  #net {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
  }
  #sliderWrap {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 60%;
  }
  #track {
    position: relative;
    height: 40px;
  }
  #trackFill {
    position: absolute;
    top: 50%;
    left: 0;
    right: 0;
    transform: translateY(-50%);
    height: 10px;
    border-radius: 5px;
    background: linear-gradient(90deg, #d9f2c4, #f2a13c, #e8503a);
  }
  #slider {
    position: relative;
    width: 100%;
    height: 40px;
    -webkit-appearance: none;
    appearance: none;
    background: transparent;
    outline: none;
    z-index: 2;
  }
  #slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 46px;
    height: 40px;
    background: transparent;
    cursor: pointer;
  }
  #slider::-moz-range-thumb {
    width: 46px;
    height: 40px;
    background: transparent;
    border: none;
    cursor: pointer;
  }
  #slider::-webkit-slider-runnable-track { background: transparent; }
  #slider::-moz-range-track { background: transparent; }
  #slider:disabled { cursor: default; }
  #slider:disabled ~ #thumb { filter: grayscale(0.35) drop-shadow(0 0 10px rgba(255,255,255,0.5)); }
  #thumb {
    position: absolute;
    top: 50%;
    width: 46px;
    height: 46px;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 3;
    filter: drop-shadow(0 0 10px rgba(255,255,255,0.8));
  }
  #thumb img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }
  #updatePanel {
    position: absolute;
    left: 50%;
    top: calc(50% + 55px);
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    z-index: 4;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  #updateBtn {
    padding: 11px 30px;
    border-radius: 999px;
    border: none;
    cursor: pointer;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: .3px;
    color: #241708;
    background: linear-gradient(90deg, #d9f2c4, #f2a13c, #e8503a);
    box-shadow: 0 4px 16px rgba(0,0,0,0.45);
    transition: transform .15s ease, box-shadow .15s ease, opacity .15s ease;
  }
  #updateBtn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.55); }
  #updateBtn:active { transform: translateY(0); }
  #updateBtn:disabled { opacity: .55; cursor: default; transform: none; }
  #statusMsg {
    font-size: 12px;
    min-height: 14px;
    color: rgba(255,255,255,0.75);
  }
  #roomInfo {
    font-size: 12px;
    color: rgba(255,255,255,0.6);
    text-align: center;
    max-width: 340px;
    line-height: 1.5;
  }
  #roomInfo code {
    background: rgba(255,255,255,0.12);
    padding: 2px 7px;
    border-radius: 5px;
    color: #f2c14e;
  }
  #copyLinkBtn {
    border: none;
    background: rgba(255,255,255,0.12);
    color: #fff;
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 999px;
    cursor: pointer;
    margin-left: 4px;
  }
  #copyLinkBtn:hover { background: rgba(255,255,255,0.22); }
</style>
</head>

  <canvas id="net"></canvas>

  <div id="updatePanel">
    <button id="updateBtn">🔄 Actualizar estado</button>
    <div id="statusMsg"></div>
    <div id="roomInfo">Conectando…</div>
  </div>
</div>

<script>
(function(){
  var canvas = document.getElementById('net');
  var ctx = canvas.getContext('2d');
  var W, H;

  function resize(){
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  var N = 45;
  var nodes = [];
  for (var i = 0; i < N; i++) {
    nodes.push({
      x: Math.random() * W,
      y: Math.random() * H,
      vx: (Math.random() - 0.5) * 0.4,
      vy: (Math.random() - 0.5) * 0.4
    });
  }

  function step(){
    ctx.clearRect(0, 0, W, H);

    for (var i = 0; i < nodes.length; i++) {
      var n = nodes[i];
      n.x += n.vx;
      n.y += n.vy;
      if (n.x < 0 || n.x > W) n.vx *= -1;
      if (n.y < 0 || n.y > H) n.vy *= -1;
    }

    ctx.lineWidth = 1;
    for (var i = 0; i < nodes.length; i++) {
      for (var j = i + 1; j < nodes.length; j++) {
        var a = nodes[i], b = nodes[j];
        var dx = a.x - b.x, dy = a.y - b.y;
        var dist = Math.sqrt(dx * dx + dy * dy);
        var maxDist = Math.min(W, H) * 0.22;
        if (dist < maxDist) {
          var alpha = 0.35 * (1 - dist / maxDist);
          ctx.strokeStyle = 'rgba(255,255,255,' + alpha.toFixed(3) + ')';
          ctx.beginPath();
          ctx.moveTo(a.x, a.y);
          ctx.lineTo(b.x, b.y);
          ctx.stroke();
        }
      }
    }

    for (var i = 0; i < nodes.length; i++) {
      var n = nodes[i];
      ctx.beginPath();
      ctx.arc(n.x, n.y, 2, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      ctx.fill();
    }

    requestAnimationFrame(step);
  }
  requestAnimationFrame(step);

  var slider = document.getElementById('slider');
  var thumb = document.getElementById('thumb');
  var track = document.getElementById('track');

  function updateThumb(){
    var pct = (slider.value - slider.min) / (slider.max - slider.min);
    var trackWidth = track.getBoundingClientRect().width;
    var x = pct * trackWidth;
    thumb.style.left = x + 'px';
  }
  slider.addEventListener('input', updateThumb);
  window.addEventListener('resize', updateThumb);
  updateThumb();

  // ---- Sincronización con backend propio (admin / viewer) ----
  // 1) Despliega backend/server.js (instrucciones al final del mensaje).
  // 2) Reemplaza la URL de abajo por la de tu servidor ya desplegado,
  //    o pásala como ?api=https://tu-backend.onrender.com en la URL.
  var BACKEND_URL = 'https://nat-ali4.onrender.com';

  var updateBtn = document.getElementById('updateBtn');
  var statusMsg = document.getElementById('statusMsg');
  var roomInfo = document.getElementById('roomInfo');
  var room = null;
  var adminToken = null;
  var role = null; // 'admin' | 'viewer'

  function getParam(name){
    return new URLSearchParams(window.location.search).get(name);
  }

  function setStatus(text, isError){
    statusMsg.textContent = text;
    statusMsg.style.color = isError ? '#ff8a80' : 'rgba(255,255,255,0.75)';
  }

  function applyRoleUI(){
    if (role === 'admin') {
      updateBtn.textContent = 'Actualizar el estado';
      slider.disabled = false;
    } else {
      updateBtn.textContent = 'Update';
      slider.disabled = true; // los viewers solo visualizan, no arrastran
    }
  }

  function renderRoomInfo(){
    if (!room) {
      roomInfo.textContent = 'No se pudo conectar con el servidor.';
      return;
    }
    if (role === 'admin') {
      var viewerUrl = new URL(window.location.href);
      viewerUrl.searchParams.delete('admin');
      viewerUrl.searchParams.set('room', room);
      roomInfo.innerHTML = 'Eres el <b>admin</b> · Sala: <code>' + room + '</code><br>' +
        'Comparte este enlace (solo lectura) con los demás' +
        '<button id="copyLinkBtn" type="button">Copiar enlace</button><br>' +
        '<span style="opacity:.7">Guarda esta pestaña/enlace para seguir siendo admin</span>';
      document.getElementById('copyLinkBtn').addEventListener('click', function(){
        navigator.clipboard.writeText(viewerUrl.toString()).then(function(){
          setStatus('Enlace de invitado copiado ✓', false);
        }).catch(function(){
          setStatus('No se pudo copiar el enlace', true);
        });
      });
    } else {
      roomInfo.innerHTML = 'Modo espectador · Sala: <code>' + room + '</code>';
    }
  }

  async function createRoom(){
    var res = await fetch(BACKEND_URL + '/rooms', { method: 'POST' });
    if (!res.ok) throw new Error('No se pudo crear la sala');
    return res.json(); // { room, adminToken }
  }

  async function ensureRoomAndRole(){
    var roomParam = getParam('room');
    var adminParam = getParam('admin');

    if (!roomParam) {
      // Nadie ha creado sala todavía -> esta pestaña se vuelve admin
      var created = await createRoom();
      var url = new URL(window.location.href);
      url.searchParams.set('room', created.room);
      url.searchParams.set('admin', created.adminToken);
      window.history.replaceState({}, '', url);
      return { room: created.room, adminToken: created.adminToken, role: 'admin' };
    }
    if (adminParam) {
      return { room: roomParam, adminToken: adminParam, role: 'admin' };
    }
    return { room: roomParam, adminToken: null, role: 'viewer' };
  }

  async function pushStatus(){
    if (!room || role !== 'admin') return;
    var res = await fetch(BACKEND_URL + '/status/' + room, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ value: Number(slider.value), adminToken: adminToken })
    });
    if (!res.ok) throw new Error('No autorizado o error al publicar');
  }

  async function pullStatus(){
    if (!room) return;
    var res = await fetch(BACKEND_URL + '/status/' + room);
    if (res.status === 404) return; // sala sin estado publicado aún
    if (!res.ok) throw new Error('No se pudo leer el estado');
    var data = await res.json();
    if (typeof data.value === 'number') {
      slider.value = data.value;
      updateThumb();
    }
  }

  async function initSync(){
    var apiOverride = getParam('api');
    if (apiOverride) BACKEND_URL = apiOverride;

    try {
      setStatus('Conectando…', false);
      var info = await ensureRoomAndRole();
      room = info.room;
      adminToken = info.adminToken;
      role = info.role;
      applyRoleUI();
      renderRoomInfo();
      await pullStatus();
      setStatus('Listo', false);
    } catch (err) {
      setStatus('Sin conexión con el backend (¿ya lo desplegaste y configuraste BACKEND_URL?)', true);
      renderRoomInfo();
    }
  }

  updateBtn.addEventListener('click', async function(){
    updateBtn.disabled = true;
    setStatus(role === 'admin' ? 'Actualizando…' : 'Consultando…', false);
    try {
      if (role === 'admin') await pushStatus();
      await pullStatus();
      setStatus('Actualizado ✓', false);
    } catch (err) {
      setStatus('Error al actualizar', true);
    } finally {
      updateBtn.disabled = false;
    }
  });

  initSync();
})();
</script>
</body>
</html>
